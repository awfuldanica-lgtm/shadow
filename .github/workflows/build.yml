name: Build Shadow (rootless)

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential fakeroot rsync perl curl zip unzip git dpkg-dev jq xz-utils

      - name: Install ldid (Procursus)
        run: |
          curl -L -o /tmp/ldid https://github.com/ProcursusTeam/ldid/releases/latest/download/ldid_linux_x86_64
          chmod +x /tmp/ldid
          sudo mv /tmp/ldid /usr/local/bin/ldid

      - name: Install Theos
        run: |
          export THEOS=$HOME/theos
          git clone --recursive https://github.com/theos/theos.git $THEOS
          echo "THEOS=$THEOS" >> $GITHUB_ENV
          echo "$THEOS/bin" >> $GITHUB_PATH

      - name: Install iOS cross-compile toolchain (swift-toolchain-linux)
        run: |
          TOOLCHAIN_URL=$(curl -sL https://api.github.com/repos/kabiroberai/swift-toolchain-linux/releases/latest \
            | jq -r '.assets[] | select(.name | endswith("ubuntu22.04.tar.xz")) | .browser_download_url' \
            | head -1)
          if [ -z "$TOOLCHAIN_URL" ]; then
            # fallback: any ubuntu tarball
            TOOLCHAIN_URL=$(curl -sL https://api.github.com/repos/kabiroberai/swift-toolchain-linux/releases/latest \
              | jq -r '.assets[] | select(.name | endswith(".tar.xz")) | .browser_download_url' | head -1)
          fi
          echo "Toolchain URL: $TOOLCHAIN_URL"
          curl -L -o /tmp/toolchain.tar.xz "$TOOLCHAIN_URL"
          # Tarball top-level is "linux/"; extract at $THEOS/toolchain so we end
          # up with $THEOS/toolchain/linux/iphone/bin/clang (not doubly nested).
          rm -rf $THEOS/toolchain/linux
          mkdir -p $THEOS/toolchain
          tar xJf /tmp/toolchain.tar.xz -C $THEOS/toolchain
          echo "--- layout ---"
          ls $THEOS/toolchain
          ls $THEOS/toolchain/linux
          ls $THEOS/toolchain/linux/iphone/bin/ | head -5
          $THEOS/toolchain/linux/iphone/bin/clang --version

      - name: Install iOS SDK 16.5 (sparse)
        run: |
          git clone --filter=blob:none --no-checkout --depth=1 \
            https://github.com/theos/sdks.git /tmp/sdks
          cd /tmp/sdks
          git sparse-checkout init --cone
          git sparse-checkout set iPhoneOS16.5.sdk
          git checkout
          mv iPhoneOS16.5.sdk $THEOS/sdks/
          ls $THEOS/sdks/

      - name: Install libSandy header + link-time stub
        run: |
          # Grab the real header from upstream.
          mkdir -p $THEOS/include $THEOS/lib
          curl -L -o $THEOS/include/libSandy.h \
            https://raw.githubusercontent.com/opa334/libSandy/main/libSandy.h
          echo "--- libSandy.h ---"
          cat $THEOS/include/libSandy.h
          # Build a stub .dylib exposing the same symbols so the linker is happy.
          # The real libsandy.dylib is installed on the device as a package
          # dependency and resolves the symbols at load time.
          cat > /tmp/libsandy_stub.m <<'EOF'
          #include "libSandy.h"
          int libSandy_applyProfile(const char *profileName) { (void)profileName; return 0; }
          EOF
          CLANG=$THEOS/toolchain/linux/iphone/bin/clang
          SDK=$THEOS/sdks/iPhoneOS16.5.sdk
          for arch in arm64 arm64e; do
            $CLANG -arch $arch -target ${arch}-apple-ios14.0 \
              -isysroot $SDK -I$THEOS/include \
              -shared -fPIC \
              -install_name /var/jb/usr/lib/libsandy.dylib \
              -o /tmp/libsandy-$arch.dylib \
              /tmp/libsandy_stub.m
          done
          # Merge into a fat mach-o so -lsandy link works for both slices.
          $THEOS/toolchain/linux/iphone/bin/lipo -create \
            /tmp/libsandy-arm64.dylib /tmp/libsandy-arm64e.dylib \
            -output $THEOS/lib/libsandy.dylib
          ldid -S $THEOS/lib/libsandy.dylib || true
          file $THEOS/lib/libsandy.dylib

      - name: Build AltList framework (ShadowSettings dependency)
        env:
          THEOS: /home/runner/theos
        run: |
          git clone --depth=1 --recursive https://github.com/opa334/AltList.git /tmp/altlist
          cd /tmp/altlist
          THEOS_PACKAGE_SCHEME=rootless ARCHS="arm64 arm64e" \
            TARGET=iphone:clang:latest:14.0 FINALPACKAGE=1 make || \
          THEOS_PACKAGE_SCHEME=rootless ARCHS="arm64 arm64e" \
            TARGET=iphone:clang:latest:14.0 make
          fw=$(find .theos -type d -name 'AltList.framework' 2>/dev/null | head -1)
          echo "AltList framework at: $fw"
          if [ -z "$fw" ]; then
            echo "::error::AltList build did not produce a framework"; exit 1
          fi
          cp -r "$fw" "$GITHUB_WORKSPACE/vendor/"
          ls -la "$GITHUB_WORKSPACE/vendor/AltList.framework/"

      - name: Build dependency .debs (Modulous / RootBridge / HookKit / ellekit module)
        env:
          THEOS_PACKAGE_SCHEME: rootless
          ARCHS: "arm64 arm64e"
          TARGET: "iphone:clang:latest:14.0"
          FINALPACKAGE: "1"
        run: |
          set -e
          OUT=$GITHUB_WORKSPACE/output_packages
          mkdir -p $OUT

          # 1. Modulous (no external deps)
          (cd vendor/Modulous.framework && make clean && make package && cp packages/*.deb $OUT/)

          # 2. RootBridge (no external deps)
          (cd vendor/RootBridge.framework && make clean && make package && cp packages/*.deb $OUT/)

          # 3. HookKit framework (its vendor/ already has Modulous + RootBridge submodules)
          (cd vendor/HookKit.framework && make clean && make package && cp packages/*.deb $OUT/)

          # 4. HookKit ellekit module (provides me.jjolano.hkmodule.substrate virtual pkg)
          # Its vendor/ already has libhooker headers, lib_ellekit.tbd, and a
          # bundled HookKit.framework, so it builds standalone.
          (cd vendor/HookKit.framework/Modules/libellekit.bundle && \
            make clean && make package && cp packages/*.deb $OUT/)

          ls -la $OUT/

      - name: Build rootless .deb
        env:
          THEOS_PACKAGE_SCHEME: rootless
          ARCHS: "arm64 arm64e"
          TARGET: "iphone:clang:latest:14.0"
          FINALPACKAGE: "1"
          ADDITIONAL_LDFLAGS: "-L/home/runner/theos/lib"
        run: |
          # Mirror libsandy stub into rootless lib dir too, belt-and-suspenders.
          mkdir -p $THEOS/lib/iphone/rootless
          cp $THEOS/lib/libsandy.dylib $THEOS/lib/iphone/rootless/ || true
          make clean || true
          make package
          # Bundle shadow deb together with deps for one-shot install.
          cp packages/*.deb $GITHUB_WORKSPACE/output_packages/
          ls -la $GITHUB_WORKSPACE/output_packages/

      - name: Upload deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: shadow-rootless-deb
          path: output_packages/*.deb
          if-no-files-found: error
